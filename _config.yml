# Site settings
title: "Jadesola's Academic Site"
description: "A space to share my research, projects, and academic insights"
url: "https://jadesola123.github.io"
baseurl: ""

# Theme settings
remote_theme: pages-themes/minimal@v0.2.0

# Author information
author:
  name: "Jadesola"
  email: "jadesolak.business@gmail.com"

# Social links
social_links:
  - label: "GitHub"
    url: "https://github.com/jadesola123"
  - label: "LinkedIn"
    url: "https://linkedin.com/in/jadesola-kareem"
  - label: "Twitter"
    url: "https://twitter.com/jaded_developer"

# Navigation menu items
nav:
  - title: "Blog"
    url: "/blog/blog.md"
  - title: "About Me"
    url: "/about/about.md"
  - title: "Publications"
    url: "/publications/publications.md"

# Exclude files from being published to GitHub Pages
exclude:
  - README.md
  - LICENSE.md

# Permalinks configuration
permalink: "pretty"

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-remote-theme

# Other settings
timezone: "Europe/London"
