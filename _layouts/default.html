<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
</head>
<body>

  <header>
    <nav style="background-color: #D5006D; padding: 10px; transition: background-color 0.3s ease;">
      <ul style="list-style-type: none; padding: 0; margin: 0; display: flex; justify-content: space-around;">
        <li style="margin-right: 20px;">
          <a href="{{ site.url }}/" 
             style="color: white; text-decoration: none; padding: 10px; font-weight: bold; 
                    transition: color 0.3s ease, transform 0.3s ease;">
            Home
          </a>
        </li>
        <li style="margin-right: 20px;">
          <a href="{{ site.url }}/blog/blog" 
             style="color: white; text-decoration: none; padding: 10px; font-weight: bold; 
                    transition: color 0.3s ease, transform 0.3s ease;">
            Blog
          </a>
        </li>
        <li style="margin-right: 20px;">
          <a href="{{ site.url }}/about/about" 
             style="color: white; text-decoration: none; padding: 10px; font-weight: bold; 
                    transition: color 0.3s ease, transform 0.3s ease;">
            About Me
          </a>
        </li>
        <li>
          <a href="{{ site.url }}/publications/publications" 
             style="color: white; text-decoration: none; padding: 10px; font-weight: bold; 
                    transition: color 0.3s ease, transform 0.3s ease;">
            Publications
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: "%Y" }} Jadesola Kareem. All Rights Reserved.</p>
  </footer>

</body>
</html>
